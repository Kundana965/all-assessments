<!-- template.html – copy the structure to all pages and change only <main> -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>SmartRetail</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body data-page="cart">
  <!-- Navbar -->
  <header class="navbar">
    <div class="logo">SmartRetail</div>
    <nav>
      <a href="/index.html" data-page="home">Home</a>
      <a href="/products.html" data-page="products">Products</a>
      <a href="/cart.html" data-page="cart">Cart</a>
      <a href="/about.html" data-page="about">About Us</a>
      <a href="/contact.html" data-page="contact">Contact</a>
    </nav>
    <div class="auth-buttons">
      <a href="/login.html" id="loginLink">Login</a>
      <a href="/signup.html" id="signupLink">Signup</a>
      <button id="logoutBtn" class="hidden">Logout</button>
    </div>
  </header>

  <main>
    <h2>Your Cart</h2>
    <table class="cart-table">
      <thead>
        <tr>
          <th>Product</th>
          <th>Weight</th>
          <th>Price</th>
          <th>Qty</th>
          <th>Line Total</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="cartTableBody"></tbody>
    </table>

    <div class="section">
      <p>Subtotal: <span id="subtotal">₹0</span></p>
      <p>Tax (5%): <span id="tax">₹0</span></p>
      <h3>Total: <span id="total">₹0</span></h3>
      <button class="btn" id="checkoutBtn">Proceed to Billing</button>
    </div>
  </main>
  <footer class="footer">
    <p>SmartRetail, Kadapa, Andhra Pradesh</p>
    <p>Email: support@smartretail.com | Phone: +91-99999-99999</p>
    <p>&copy; 2026 SmartRetail</p>
  </footer>
</body>
<script src="/app.js"></script>
</html>
