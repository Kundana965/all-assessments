<!-- template.html – copy the structure to all pages and change only <main> -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>SmartRetail</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body data-page="signup">
  <header class="navbar">
    <div class="logo">SmartRetail</div>
    <nav>
      <a href="/index.html" data-page="home">Home</a>
      <a href="/products.html" data-page="products">Products</a>
      <a href="/cart.html" data-page="cart">Cart</a>
      <a href="/about.html" data-page="about">About Us</a>
      <a href="/contact.html" data-page="contact">Contact</a>
    </nav>
    <div class="auth-buttons">
      <a href="/login.html" id="loginLink">Login</a>
      <a href="/signup.html" id="signupLink">Signup</a>
      <button id="logoutBtn" class="hidden">Logout</button>
    </div>
  </header>
  <main>
    <div class="form-card">
      <h2>Signup</h2>
      <form id="signupForm">
        <label>Full Name</label>
        <input type="text" name="fullName" />
        <label>Email</label>
        <input type="email" name="email" />
        <label>Password</label>
        <input type="password" name="password" />
        <label>Confirm Password</label>
        <input type="password" name="confirmPassword" />
        <button class="btn" type="submit">Signup</button>
      </form>
      <div id="signupMsg" class="message"></div>
    </div>
  </main>
   <footer class="footer">
    <p>SmartRetail, Kadapa, Andhra Pradesh</p>
    <p>Email: support@smartretail.com | Phone: +91-99999-99999</p>
    <p>&copy; 2026 SmartRetail</p>
  </footer>
</body>
<script src="/app.js"></script>
</html>
